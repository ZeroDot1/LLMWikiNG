{% extends "base.html" %}
{% block title %}{{ _('wiki_new.title') }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold mb-2">{{ _('wiki_new.title') }}</h1>

    {% if error %}
    <div class="rounded-lg border border-warning/40 bg-warning-subtle p-3 mb-4 text-sm"><strong>{{ _('wiki_new.error') }}</strong> {{ error }}</div>
    {% endif %}

    <div class="rounded-xl border border-border bg-surface p-6 shadow-sm">
        <form action="{{ base_path }}/wikis/new" method="post" class="space-y-4">
            <div>
                <label for="name" class="block font-medium mb-1">{{ _('wiki_new.name') }}</label>
                <input type="text" name="name" id="name" required autofocus class="w-full rounded-lg border border-border bg-surface px-3 py-2 text-text focus:border-border-focus focus:ring-2 focus:ring-primary-subtle" placeholder="{{ _('wiki_new.name_placeholder') }}">
            </div>
            <div>
                <label for="description" class="block font-medium mb-1">{{ _('wiki_new.description') }}</label>
                <textarea name="description" id="description" rows="3" class="w-full rounded-lg border border-border bg-surface px-3 py-2 text-text focus:border-border-focus focus:ring-2 focus:ring-primary-subtle" placeholder="{{ _('wiki_new.description') }}"></textarea>
            </div>
            <div>
                <button type="submit" class="rounded-lg bg-primary px-4 py-2 text-white hover:bg-primary-hover">{{ _('wiki_new.submit') }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
