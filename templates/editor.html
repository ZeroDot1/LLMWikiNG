{% extends "base.html" %}
{% block title %}{{ _('editor.page_title') }}{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-1">{{ _('editor.heading') }}</h1>
<p class="text-text-secondary mb-6">{{ _('editor.intro_text') }}</p>

{% if error_msg %}
<div class="rounded-lg border border-warning/40 bg-warning-subtle p-3 mb-4 text-sm text-error"><strong>⚠️</strong> {{ error_msg }}</div>
{% endif %}

<form id="editor-form" action="{{ base_path }}/edit/save" method="POST" class="space-y-4">
    <input type="hidden" name="folder" value="{{ folder }}">
    <div>
        <label for="filename-input" class="block font-bold mb-1 text-text">{{ _('editor.filename_label') }}</label>
        <input type="text" id="filename-input" name="filename" value="{{ filename }}" placeholder="{{ _('editor.filename_placeholder') }}" required
               class="w-full rounded-lg border border-border bg-surface px-3 py-2 font-mono text-text focus:border-border-focus focus:ring-2 focus:ring-primary-subtle">
    </div>

    <div class="flex border-b-2 border-border mb-3">
        <button type="button" id="tab-wysiwyg" class="editor-tab active px-4 py-2 font-bold border-b-2 border-primary text-text" onclick="switchTab('wysiwyg')">{{ _('editor.wysiwyg_tab') }}</button>
        <button type="button" id="tab-markdown" class="editor-tab px-4 py-2 font-bold border-b-2 border-transparent text-text-muted" onclick="switchTab('markdown')">{{ _('editor.markdown_tab') }}</button>
    </div>

    <div id="editor-toolbar" class="flex flex-wrap gap-1.5 p-2 bg-bg-sunken border border-border rounded-t-lg">
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1 font-bold" onclick="execCmd('bold')" title="{{ _('editor.wysiwyg_bold') }}">B</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1 italic" onclick="execCmd('italic')" title="{{ _('editor.wysiwyg_italic') }}">I</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1 line-through" onclick="execCmd('strikeThrough')" title="Strikethrough">S</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1 font-mono" onclick="insertInlineCode()" title="Code">&lt;/&gt;</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="execCmd('insertUnorderedList')" title="{{ _('editor.wysiwyg_list') }}">• List</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="execCmd('formatBlock', '<blockquote>')" title="Quote">❝ Quote</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="execCmd('insertHorizontalRule')" title="Line">― HR</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="insertLink()" title="Link">🔗 Link</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="insertImage()" title="Image">🖼️ Image</button>
        <span class="border-l border-border mx-1"></span>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="execCmd('formatBlock', '<h1>')" title="H1">H1</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="execCmd('formatBlock', '<h2>')" title="H2">H2</button>
        <button type="button" class="toolbar-btn rounded border border-border bg-surface px-2 py-1" onclick="execCmd('formatBlock', '<h3>')" title="H3">H3</button>
    </div>

    <div id="wysiwyg-editor-wrapper">
        <div id="editor-wysiwyg" contenteditable="true" class="wiki-content min-h-[400px] p-4 border border-t-0 border-border rounded-b-lg bg-surface text-text outline-none overflow-y-auto"></div>
    </div>

    <div id="markdown-editor-wrapper" style="display: none;">
        <textarea id="editor-markdown" name="content" class="w-full min-h-[400px] p-4 border border-border rounded-lg bg-surface text-text font-mono text-sm leading-relaxed outline-none resize-y focus:border-border-focus focus:ring-2 focus:ring-primary-subtle">{{ content }}</textarea>
        <div id="preview" class="wiki-content mt-3 p-4 border border-border rounded-lg bg-bg-sunken"></div>
    </div>

    <div class="flex justify-end">
        <button type="submit" class="rounded-lg bg-primary px-6 py-2.5 font-bold text-white hover:bg-primary-hover">{{ _('editor.save_btn') }}</button>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ base_path }}/static/js/editor.js?v={{ app_version }}"></script>
{% endblock %}
