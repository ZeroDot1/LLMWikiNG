services:
  llmwiking:
    build: .
    container_name: llmwiking_app
    ports:
      - "8082:8080" # Mappt Port 8082 des Hosts auf Port 8080 des Containers
    restart: unless-stopped
    # HINWEIS: Es sind absichtlich keine Volumes / Mounts konfiguriert. 
    # Gemäß deiner Anforderung werden alle Dateien (Wikis, Rohquellen, Datenbanken) 
    # ausschließlich im beschreibbaren Layer innerhalb des Containers gespeichert.
    environment:
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      - /volume1/docker/llmwiking/data:/app/data
      - /volume1/docker/llmwiking/wikis:/app/wikis

